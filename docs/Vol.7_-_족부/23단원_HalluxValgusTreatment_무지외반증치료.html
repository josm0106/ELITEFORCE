<p>제23단원</p><p><strong>무지외반증 치료 (Hallux Valgus Treatment)</strong></p><p><strong>1. 수술 적응증</strong></p><p>  • HVA &gt;20도 또는 IMA &gt;13도 &amp; 증상</p><p>  • 보존적 치료 실패</p><p>  • 1인 발가락 중족골 관절염</p><p><strong>2. 수술 기법</strong></p><p>  • Simple exostectomy</p><p>    - 경미한 변형: 관절머리 돌출부 제거</p><p>  • Osteotomy</p><p>    - 중등도: 제1중족골 절골술</p><p>    - 심함: 근위 절골술</p><p>  • Arthrodesis</p><p>    - 심한 변형 또는 관절염</p><p><strong>3. 술 후 합병증</strong></p><p>  • 재발, 정렬 부정, 강직</p><p>  • 신경 손상, 혈관 손상</p>
