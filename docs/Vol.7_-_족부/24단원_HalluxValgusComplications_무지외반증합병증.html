<p>제24단원</p><p><strong>무지외반증 합병증 (Hallux Valgus Complications)</strong></p><p><strong>1. 술 전 합병증</strong></p><p>  • 2인 발가락 변형 (hammer toe)</p><p>  • 2-5인 중족골두 통증</p><p>  • 족저부 캘러스 형성</p><p><strong>2. 술 중 합병증</strong></p><p>  • 신경 손상</p><p>  • 혈관 손상</p><p>  • 과도한 교정</p><p><strong>3. 술 후 합병증</strong></p><p>  • 재발: 부정확한 절골술 또는 과소 교정</p><p>  • 강직: 무지 관절의 불완전한 움직임</p><p>  • 신경병증: 수술 신경 손상 후유증</p><p>  • 혈관 문제: 혈류 부족</p><p><strong>4. 관절염 합병증</strong></p><p>  • 1인 중족골-무지골 관절 관절염</p><p>  • 강직성 대증</p>
